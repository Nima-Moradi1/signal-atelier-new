name: Deploy to Liara

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: liara-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Validate and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify deployment credentials
        env:
          LIARA_API_TOKEN: ${{ secrets.LIARA_API_TOKEN }}
        run: |
          if [ -z "$LIARA_API_TOKEN" ]; then
            echo "::error::Add LIARA_API_TOKEN under Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Install Liara CLI
        run: npm install --global @liara/cli@9

      - name: Deploy production to Liara
        env:
          LIARA_API_TOKEN: ${{ secrets.LIARA_API_TOKEN }}
        run: >-
          liara deploy
          --app="nimamoradirad"
          --port=3000
          --api-token="$LIARA_API_TOKEN"
          --message="GitHub ${GITHUB_SHA::7}"
          --no-app-logs
